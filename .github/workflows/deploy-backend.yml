name: Deploy Backend to VPS

on:
  push:
    branches: [main]
    paths:
      - "Pdc.WebAPI/**"
      - "Pdc.Application/**"
      - "Pdc.Domain/**"
      - "Pdc.Infrastructure/**"
  workflow_dispatch:

env:
  DOTNET_VERSION: "10.0.x"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Create appsettings.Production.json
        run: |
          cat > Pdc.WebAPI/appsettings.Production.json << EOF
          {
            "Logging": {
              "LogLevel": {
                "Default": "Information",
                "Microsoft.AspNetCore": "Warning"
              }
            },
            "ConnectionStrings": {
              "DefaultConnection": "${{secrets.DB_CONNECTION_STRING}}",
            },
            "AzureAd": {
              "Instance": "https://login.microsoftonline.com/",
              "TenantId": "${{ secrets.AZURE_TENANT_ID }}",
              "ClientId": "${{ secrets.AZURE_CLIENT_ID }}",
              "ClientSecret": "${{ secrets.AZURE_CLIENT_SECRET }}",
              "CallbackPath": "${{secrets.AZURE_CALLBACK_PATH}}"
            },
            "AuthCookie": {
              "HoursTimeSpan": ${{secrets.COOKIE_TIME_SPAN}},
              "IsSliding": true
            },
            "DefaultRedirectUriAfterLogin": "${{secrets.REDIRECT_URL_AFTER_LOGIN}}",
            "DefaultRedirectUriAfterLogout": "${{secrets.REDIRECT_URL_AFTER_LOGOUT}}",
            "Cors": {
              "AllowedOrigins": "${{secrets.CORS_ORIGINS}}"
            },
            "AutoMapper:": {
              "LicenseKey":"${{secrets.AUTOMAPPER_LICENCE_KEY}}" }
          }	
          EOF

      - name: Publish in Release mode
        run: dotnet publish Pdc.WebAPI/Pdc.WebAPI.csproj -c Release -o ./publish

      - name: Stop back-end
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e
            systemctl stop api

      - name: Deploy to VPS
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          source: "publish/*"
          target: "/var/www/back-end/"
          strip_components: 1 # Removes publish/ from path
          overwrite: true

      - name: Restart front-end service
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e
            systemctl start api
            systemctl status api
